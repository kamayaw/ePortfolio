<!DOCTYPE HTML>

<html>

<head>
   <title>Music Survey</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 20px;
}
h1 {
    text-align: center;
}
form {
    background: white;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
label {
    display: block;
    margin-top: 10px;
}
input, textarea, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}
fieldset {
    margin-top: 15px;
    padding: 10px;
    border: 1px solid #ccc;
}
legend {
    font-weight: bold;
}
.inline {
    width: auto;
}
.buttons {
    margin-top: 15px;
    text-align: center;
}
footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
}
</style>
</head>
<body>
<h1>Music Survey</h1>
<form action="https://formspree.io/f/mdapkoqz" method="POST">
   <!-- Name -->
<label for="name">Name:</label>
<input type="text" id="name" name="name" required>
<!-- Email -->
<label for="email">E-mail:</label>
<input type="email" id="email" name="email" required>
<!-- Checkbox Group -->
<fieldset>
<legend>Select Your Favorite Types of Music:</legend>
<label><input type="checkbox" class="inline" name="music" value="Pop"> Pop</label>
<label><input type="checkbox" class="inline" name="music" value="Rock"> Rock</label>
<label><input type="checkbox" class="inline" name="music" value="Rap"> Rap</label>
<label><input type="checkbox" class="inline" name="music" value="Classical"> Classical</label>
</fieldset>
<!-- Radio Group -->
<fieldset>
<legend>Select how often you purchase Music:</legend>
<label><input type="radio" class="inline" name="purchase" value="Weekly"> Weekly</label>
<label><input type="radio" class="inline" name="purchase" value="Monthly"> Monthly</label>
<label><input type="radio" class="inline" name="purchase" value="Never"> Never</label>
</fieldset>
<!-- Select Box -->
<label for="location">Select the locations you listen to Music:</label>
<select id="location" name="location" size="3">
    <option>At home</option>
    <option>In the car</option>
    <option>At school</option>
    <option>Anywhere</option>
</select>
<!-- Textarea -->
<label for="role">What role does music play in your life?</label>
<textarea id="role" name="role" cols="60" rows="3"></textarea>
<!-- Buttons -->
<div class="buttons">
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</div>
</form>
<!-- Footer -->
<footer>
<p>Kamaya Washington | kamayaawashington2024@gmail.com</p>
</footer>
</body>



</html>
